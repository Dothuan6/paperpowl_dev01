<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập / Đăng ký | Paperbowl</title>
  <meta name="description" content="Đăng nhập hoặc đăng ký tài khoản Paperbowl." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&amp;family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-body">
        <div class="auth-logo"><a href="index.html"><img src="assets/Logo.jpg" alt="Paperbowl" /></a></div>

        <!-- STEP 1: login -->
        <div class="auth-step" id="authLogin">
          <button type="button" class="auth-oauth auth-oauth--google">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.1 14.6 2 12 2 6.9 2 2.8 6.1 2.8 11.2S6.9 20.4 12 20.4c5.9 0 9.8-4.1 9.8-9.9 0-.7-.1-1.2-.2-1.7H12z"/></svg>
            Tiếp tục với Google
          </button>
          <button type="button" class="auth-oauth auth-oauth--apple">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#fff" d="M16.4 12.7c0-2 1.6-3 1.7-3-1-1.4-2.4-1.6-2.9-1.6-1.2-.1-2.4.7-3 .7-.6 0-1.6-.7-2.6-.7-1.3 0-2.6.8-3.3 2-1.4 2.4-.4 6 1 8 .7.9 1.4 2 2.5 1.9 1-.04 1.4-.6 2.6-.6s1.5.6 2.6.6 1.7-.9 2.4-1.8c.7-1 1-2 1-2-.02-.02-2.5-1-2.5-3.5zM14.6 5.9c.5-.7.9-1.6.8-2.5-.8.03-1.7.5-2.2 1.2-.5.6-.9 1.5-.8 2.4.9.07 1.7-.4 2.2-1.1z"/></svg>
            Tiếp tục với Apple
          </button>
          <div class="auth-divider">Hoặc</div>
          <input type="text" class="auth-input" id="authEmail" placeholder="Nhập email/số điện thoại" />
          <button type="button" class="auth-submit" id="authContinue">Tiếp tục</button>
          <a href="index.html" class="auth-back">Quay lại và tiếp tục mua hàng</a>
        </div>

        <!-- STEP 2: verify -->
        <div class="auth-verify" id="authVerify">
          <h2>Nhập mã xác thực</h2>
          <p>Vui lòng nhập mã xác thực đã được gửi qua email</p>
          <p><b id="authEmailShown">email@gmail.com</b></p>
          <input type="text" inputmode="numeric" maxlength="6" class="auth-input" id="authCode" placeholder="Nhập mã xác thực" />
          <div class="auth-resend">Chưa nhận được mã xác thực? <a id="authResend">Gửi lại sau <span id="authTimer">0:27</span></a></div>
          <a class="auth-back" id="authBack">Quay lại</a>
        </div>
      </div>
      <div class="auth-foot">Powered by <b>Paperbowl</b></div>
    </div>
  </div>

  <script>
    (function () {
      var email = document.getElementById('authEmail');
      var cont = document.getElementById('authContinue');
      var loginStep = document.getElementById('authLogin');
      var verifyStep = document.getElementById('authVerify');
      var shown = document.getElementById('authEmailShown');
      var back = document.getElementById('authBack');
      var timerEl = document.getElementById('authTimer');
      var resend = document.getElementById('authResend');
      var countdown;

      email.addEventListener('input', function () {
        cont.classList.toggle('active', email.value.trim().length > 0);
      });
      function startTimer() {
        var t = 27;
        timerEl.textContent = '0:' + String(t).padStart(2, '0');
        resend.style.pointerEvents = 'none';
        clearInterval(countdown);
        countdown = setInterval(function () {
          t--;
          if (t <= 0) { clearInterval(countdown); resend.textContent = 'Gửi lại mã'; resend.style.pointerEvents = 'auto'; return; }
          timerEl.textContent = '0:' + String(t).padStart(2, '0');
        }, 1000);
      }
      cont.addEventListener('click', function () {
        if (!email.value.trim()) return;
        shown.textContent = email.value.trim();
        loginStep.style.display = 'none';
        verifyStep.style.display = 'block';
        startTimer();
      });
      back.addEventListener('click', function () {
        verifyStep.style.display = 'none';
        loginStep.style.display = 'block';
        clearInterval(countdown);
      });
      resend.addEventListener('click', function () { if (resend.style.pointerEvents !== 'none') { resend.innerHTML = 'Gửi lại sau <span id="authTimer">0:27</span>'; timerEl = document.getElementById('authTimer'); startTimer(); } });

      // Nhập đủ 6 số -> tự xác thực và chuyển tới trang tài khoản
      var code = document.getElementById('authCode');
      code.addEventListener('input', function () {
        code.value = code.value.replace(/\D/g, '').slice(0, 6);
        if (code.value.length === 6) {
          code.disabled = true;
          setTimeout(function () { window.location.href = 'account.html'; }, 400);
        }
      });
    })();
  </script>
</body>
</html>
